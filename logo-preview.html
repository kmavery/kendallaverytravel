<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Elsewhere by Avery Logo Options</title>
    <style>
      body {
        margin: 0;
        color: #33291f;
        background: #fbf7ef;
        font-family: Avenir, system-ui, sans-serif;
      }

      header {
        position: sticky;
        top: 0;
        display: flex;
        align-items: center;
        gap: 18px;
        padding: 16px 32px;
        background: rgba(251, 247, 239, 0.94);
        border-bottom: 1px solid rgba(51, 41, 31, 0.15);
      }

      .header-logo {
        width: 190px;
        height: 64px;
        object-fit: contain;
        object-position: left center;
      }

      main {
        padding: 36px;
      }

      h1 {
        margin: 0 0 24px;
        font-family: Georgia, serif;
        font-weight: 500;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 18px;
      }

      article {
        padding: 18px;
        background: #fffaf2;
        border: 1px solid rgba(51, 41, 31, 0.15);
        border-radius: 8px;
      }

      .logo-box {
        display: grid;
        min-height: 260px;
        place-items: center;
      }

      .logo-box img {
        max-width: 100%;
        max-height: 240px;
      }
    </style>
  </head>
  <body>
    <header>
      <img class="header-logo" src="./assets/logos/logo-1.svg" alt="Elsewhere by Avery logo option 1" />
      <span>Header scale preview</span>
    </header>
    <main>
      <h1>Elsewhere by Avery logo options</h1>
      <div class="grid">
        <article>
          <h2>Option 1</h2>
          <div class="logo-box"><img src="./assets/logos/logo-1.svg" alt="Logo option 1" /></div>
        </article>
        <article>
          <h2>Option 2</h2>
          <div class="logo-box"><img src="./assets/logos/logo-2.svg" alt="Logo option 2" /></div>
        </article>
        <article>
          <h2>Option 3</h2>
          <div class="logo-box"><img src="./assets/logos/logo-3.svg" alt="Logo option 3" /></div>
        </article>
        <article>
          <h2>Option 4</h2>
          <div class="logo-box"><img src="./assets/logos/logo-4.svg" alt="Logo option 4" /></div>
        </article>
        <article>
          <h2>Option 5</h2>
          <div class="logo-box"><img src="./assets/logos/logo-5.svg" alt="Logo option 5" /></div>
        </article>
        <article>
          <h2>Option 6</h2>
          <div class="logo-box"><img src="./assets/logos/logo-6.svg" alt="Logo option 6" /></div>
        </article>
        <article>
          <h2>Option 7</h2>
          <div class="logo-box"><img src="./assets/logos/logo-7.svg" alt="Logo option 7" /></div>
        </article>
      </div>
    </main>
  </body>
</html>
